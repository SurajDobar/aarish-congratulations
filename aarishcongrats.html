<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="icon" type="image/png" href="aarishfavicon.png">
  <title>Congratulations Aarish</title>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #ffffff; /* FULL WHITE */
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
      height: 100vh;
    }

    /* IMAGE TAKES MAXIMUM AREA */
    .image-container {
      flex: 1;
      width: 100%;
      height:92%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
      box-sizing: border-box;
    }

    .image-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    /* BUTTONS BELOW IMAGE */
    .buttons {
      display: flex;
      gap: 15px;
      margin: 15px 0;
      z-index: 5;
    }

    button {
      padding: 10px 18px;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #f2f2f2;
      transition: 0.2s;
    }

    button:hover {
      background: #e5e5e5;
      transform: scale(1.05);
    }

    /* Confetti fullscreen */
    #confettiCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 10;
    }

    /* CLAP FLASH EFFECT */
    .flash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(255,255,255,0.8);
      animation: flashAnim 0.25s ease-out;
      z-index: 9;
    }

    @keyframes flashAnim {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>

  <canvas id="confettiCanvas"></canvas>

  <!-- IMAGE -->
  <div class="image-container">
    <img src="congratulations.png" alt="Congrats">
  </div>

  <!-- BUTTONS BELOW THE IMAGE -->
  <div class="buttons">
    <button onclick="launchConfetti()">🎉 Confetti</button>
    <button onclick="playClap()">👏 Clap</button>
    <button onclick="playWoo()">🦉 woo</button>
    <button onclick="playWoohoo()">🗣️ woohoo</button>
    <button onclick="playHooray()">🌟 hooray</button>
  </div>

  <!-- CLAP SOUND -->
  <audio id="clapSound" src="applause.mp3" preload="auto"></audio>
  <audio id="woohoo" src="woohoo.mp3" preload="auto"></audio>
  <audio id="woo" src="woo.mp3" preload="auto"></audio>
  <audio id="hooray" src="hooray.mp3" preload="auto"></audio>

  <script>
    const canvas = document.getElementById("confettiCanvas");
    const confettiInstance = confetti.create(canvas, { resize: true });

    function launchConfetti() {
      confettiInstance({
        particleCount: 200,
        spread: 90,
        startVelocity: 50,
        origin: { y: 0.4 }
      });
    }

    function playClap() {
      const audio = document.getElementById("clapSound");
      audio.currentTime = 0;
      audio.play();

      const flash = document.createElement("div");
      flash.classList.add("flash");
      document.body.appendChild(flash);
      setTimeout(() => flash.remove(), 250);
    }
       function playWoo() {
      const audio = document.getElementById("woo");
      audio.currentTime = 0;
      audio.play();
       }
       function playWoohoo() {
      const audio = document.getElementById("woohoo");
      audio.currentTime = 0;
      audio.play();
       }
       function playHooray() {
      const audio = document.getElementById("hooray");
      audio.currentTime = 0;
      audio.play();
       }

  </script>

</body>
</html>
